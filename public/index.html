<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Expense Sharing App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #0f172a; color: #f8fafc; }
    h1, h2, h3 { color: #f1f5f9; }
    section { margin-bottom: 30px; background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    label { display: block; margin-top: 15px; font-weight: 500; color: #cbd5e1; font-size: 14px; }
    input, select, button { margin-top: 8px; padding: 10px 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; font-size: 14px; transition: all 0.2s; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    button { background-color: #3b82f6; color: white; border: none; cursor: pointer; font-weight: 500; }
    button:hover { background-color: #2563eb; transform: translateY(-1px); }
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; overflow: hidden; border-radius: 8px; border: 1px solid #334155; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid #334155; }
    th { background-color: #0f172a; font-weight: 600; color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
    td { background-color: #1e293b; }
    tr:last-child td { border-bottom: none; }
    .participant-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .participant-row > * { flex: 1; margin-top: 0; }
    .participant-row button { flex: 0 0 50px; background-color: #ef4444; }
    .participant-row button:hover { background-color: #dc2626; }
    #add-participant-btn { background-color: #10b981; margin-bottom: 15px; }
    #add-participant-btn:hover { background-color: #059669; }
    ul { list-style-type: none; padding: 0; }
    li { background: #334155; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
  </style>
</head>
<body>
  <h1>Smart Expense Sharing</h1>

  <section id="users-section">
    <h2>Users</h2>
    <div id="users-list">Loading users...</div>
    <h3>Add User</h3>
    <form id="add-user-form">
      <input type="text" id="user-name" placeholder="Name" required>
      <input type="email" id="user-email" placeholder="Email" required>
      <input type="password" id="user-password" placeholder="Password" required>
      <button type="submit">Add User</button>
    </form>
  </section>

  <section id="add-expense-section">
    <h2>Add Expense</h2>
    <form id="add-expense-form">
      <label>Description</label>
      <input type="text" id="ex-description" required>
      
      <label>Total Amount (₹)</label>
      <input type="number" id="ex-amount" min="1" step="0.01" required>

      <label>Payer</label>
      <select id="ex-payer" required></select>

      <label>Split Type</label>
      <select id="ex-split-type" required>
        <option value="EQUAL">EQUAL</option>
        <option value="UNEQUAL">UNEQUAL</option>
      </select>

      <h3>Participants</h3>
      <div id="participants-container"></div>
      <button type="button" id="add-participant-btn" style="background-color: #28a745; margin-bottom: 10px;">+ Add Participant</button>
      
      <button type="submit">Create Expense</button>
    </form>
  </section>

  <section id="expenses-section">
    <h2>All Expenses</h2>
    <button onclick="loadExpenses()">Refresh Expenses</button>
    <div id="expenses-list">Loading...</div>
  </section>

  <section id="balances-section">
    <h2>Balances (Who Owes Whom)</h2>
    <button onclick="loadBalances()">Refresh Balances</button>
    <div id="balances-list">Loading...</div>
  </section>

  <section id="settlements-section">
    <h2>Optimized Settlements</h2>
    <p>Minimal set of transactions to settle all balances.</p>
    <button onclick="loadSettlements()">Refresh Settlements</button>
    <div id="settlements-list">Loading...</div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
